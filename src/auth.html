<style>body{font-family:sans-serif;max-width:600px;margin:40px auto}textarea{width:100%;height:120px;font-family:monospace;font-size:14px;padding:10px;box-sizing:border-box}button{padding:8px 16px;font-size:14px;cursor:pointer;margin-top:8px}kbd{background:#e8e8e8;padding:2px 6px;border-radius:3px;font-size:12px}</style>
<h2>Access Token</h2>
<textarea id="t" readonly onclick="this.select()"><?= token ?></textarea>
<button onclick="var t=document.getElementById('t');t.focus();t.select();document.execCommand('copy');this.textContent='✓ Copied!'">📋 Copy Token</button>
<p style="color:#888;font-size:13px">Click to copy, or select the textarea and press <kbd>Ctrl+C</kbd> / <kbd>Cmd+C</kbd></p>
<script>document.getElementById('t').select()</script>
